openapi: 3.0.0
info:
  title: SmartRecruit AI API
  description: API Documentation for SmartRecruit AI-Powered Recruitment System.
  version: 1.0.0
  contact:
    name: KADA Team 5
servers:
  - url: http://localhost:5000
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [admin] }
        createdAt: { type: string, format: date-time }

    JobPosting:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        aboutPosition: { type: string }
        description: { type: string }
        requirements: { type: string }
        location: { type: string }
        employmentType: { type: string, enum: [Full-time, Part-time, Internship] }
        status: { type: string, enum: [open, closed] }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Candidate:
      type: object
      properties:
        _id: { type: string }
        name: { type: string }
        email: { type: string }
        phone: { type: string }
        jobId: { type: string }
        cvUrl: { type: string }
        aiScore: { type: number, nullable: true }
        aiSummary: { type: string, nullable: true }
        aiStrengths: { type: string, nullable: true }
        aiWeaknesses: { type: string, nullable: true }
        status: { type: string, enum: [pending, processed, advanced, rejected, failed] }
        appliedAt: { type: string, format: date-time }

paths:
  # --- AUTH ---
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login as HR Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, example: demohr@mail.com }
                password: { type: string, example: password123 }
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  token: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        401:
          description: Invalid credentials

  /api/auth/change-password:
    put:
      tags: [Auth]
      summary: Change admin password
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string }
                newPassword: { type: string }
      responses:
        200:
          description: Password changed successfully

  # --- PUBLIC JOBS ---
  /api/jobs:
    get:
      tags: [Public Jobs]
      summary: Get all open job postings
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: employmentType
          schema: { type: string, enum: [Full-time, Part-time, Internship] }
      responses:
        200:
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/JobPosting' }

  /api/jobs/{id}:
    get:
      tags: [Public Jobs]
      summary: Get job details by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Job details
  
  /api/jobs/{id}/apply:
    post:
      tags: [Public Jobs]
      summary: Apply for a job
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, email, phone, cv]
              properties:
                name: { type: string }
                email: { type: string }
                phone: { type: string }
                cv: { type: string, format: binary }
      responses:
        201:
          description: Application submitted successfully

  # --- HR JOBS ---
  /api/hr/jobs:
    get:
      tags: [HR Jobs]
      summary: Get all jobs (HR version)
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: List of all jobs
    post:
      tags: [HR Jobs]
      summary: Create new job posting
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobPosting' }
      responses:
        201:
          description: Job created

  /api/hr/jobs/{id}:
    put:
      tags: [HR Jobs]
      summary: Update job posting
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobPosting' }
      responses:
        200:
          description: Job updated
    delete:
      tags: [HR Jobs]
      summary: Delete job posting
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Job deleted

  /api/hr/jobs/{id}/status:
    patch:
      tags: [HR Jobs]
      summary: Toggle job status (open/closed)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Status updated

  # --- CANDIDATES ---
  /api/candidates:
    get:
      tags: [Candidates]
      summary: Get candidates by Job ID
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: jobId
          required: true
          schema: { type: string }
      responses:
        200:
          description: List of candidates

  /api/candidates/{id}:
    get:
      tags: [Candidates]
      summary: Get candidate details
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Candidate details

  /api/candidates/{id}/accept:
    put:
      tags: [Candidates]
      summary: Accept candidate (Advanced stage)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Candidate accepted and email sent

  /api/candidates/{id}/reject:
    put:
      tags: [Candidates]
      summary: Reject candidate with AI feedback
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Candidate rejected and feedback email sent

  /api/candidates/{id}/download:
    get:
      tags: [Candidates]
      summary: Download candidate CV PDF
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: PDF File
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /api/candidates/{id}/retry:
    post:
      tags: [Candidates]
      summary: Retry failed AI screening
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Screening restarted

  /api/candidates/bulk-delete:
    post:
      tags: [Candidates]
      summary: Delete multiple candidates and their cloud files
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids: { type: array, items: { type: string } }
      responses:
        200:
          description: Candidates deleted

  # --- DASHBOARD ---
  /api/dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Get overview metrics
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Stats data

  /api/dashboard/job-distribution:
    get:
      tags: [Dashboard]
      summary: Get pie chart data
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Job distribution data

  /api/dashboard/status-breakdown:
    get:
      tags: [Dashboard]
      summary: Get bar chart data
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Status breakdown data

  /api/dashboard/recent-candidates:
    get:
      tags: [Dashboard]
      summary: Get recent candidates list
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Recent candidates list
